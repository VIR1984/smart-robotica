<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(100, 100)">
                    <!-- Body -->
                    <rect x="-30" y="-40" width="60" height="80" rx="10" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <!-- Head -->
                    <rect x="-20" y="-70" width="40" height="30" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <!-- Eyes -->
                    <circle cx="-8" cy="-60" r="4" fill="#00f0ff" opacity="0.7"/>
                    <circle cx="8" cy="-60" r="4" fill="#00f0ff" opacity="0.7"/>
                    <!-- Arms -->
                    <rect x="-50" y="-30" width="20" height="60" rx="5" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <rect x="30" y="-30" width="20" height="60" rx="5" fill="none" stroke="#ec4899" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <!-- Legs -->
                    <rect x="-20" y="40" width="15" height="40" rx="5" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <rect x="5" y="40" width="15" height="40" rx="5" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
                    <!-- Antenna -->
                    <line x1="0" y1="-70" x2="0" y2="-90" stroke="#00f0ff" stroke-width="2" stroke-dasharray="2,2" opacity="0.7"/>
                    <circle cx="0" cy="-90" r="3" fill="#ff00f7" opacity="0.8"/>
                </g>
            </svg>